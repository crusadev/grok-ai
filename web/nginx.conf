server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API calls are proxied to the api container — the browser sees one origin.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }

    # SSE stream of live job + stats events. Buffering would batch ticks into
    # multi-second hiccups; the long read timeout matches an open EventSource.
    location /api/events {
        proxy_pass http://api:3000/events;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
