services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: grok
      POSTGRES_PASSWORD: grok
      POSTGRES_DB: grok
    ports:
      - "5433:5432"
    volumes:
      - grok_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grok -d grok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  grok_pgdata:
