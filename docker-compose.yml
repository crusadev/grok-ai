services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: grok
      POSTGRES_PASSWORD: grok
      POSTGRES_DB: grok
    ports:
      - "5433:5432"
    volumes:
      - grok_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grok -d grok"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - grok_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    image: grok-ai:local
    command: ["node", "dist/server-main.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgres://grok:grok@db:5432/grok"
      REDIS_URL: "redis://redis:6379"
      PORT: "3000"
      PG_POOL_MAX: "6"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    image: grok-ai:local
    command: ["node", "dist/worker-main.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgres://grok:grok@db:5432/grok"
      REDIS_URL: "redis://redis:6379"
      WORKER_CONCURRENCY: "1"
      PG_POOL_MAX: "3"
      # Containers have no display — force headless regardless of .env.
      HEADLESS: "true"
      DEBUG_KEEP_BROWSER: "false"
    # One job (one browser + 5 tabs) per container, sized for a 32 GB box:
    # 16 x 1.8g = 28.8g workers + ~1g for db/redis/api/web + OS headroom.
    # Earlier 8x3g = 24g measured ~2.5g/worker peak with 5 tabs; if you see
    # cgroup OOM kills here, drop TABS_PER_REQUEST=3 (cuts per-worker peak ~40%)
    # before raising mem_limit, since RAM is already near the 32 GB ceiling.
    mem_limit: 1800m
    shm_size: 512m
    # Give a scaled-down / stopped worker time to drain in-flight scrape jobs
    # (each up to STREAM_TIMEOUT_MS) before Docker SIGKILLs it.
    stop_grace_period: 150s
    # Keep the Chromium sandbox usable in-container (vs the detectable --no-sandbox).
    cap_add:
      - SYS_ADMIN
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Shared CDN disk cache — first worker fetches an asset, the rest reuse it.
      - grok_cdncache:/app/.cache/cdn

  web:
    build: ./web
    image: grok-ai-web:local
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  grok_pgdata:
  grok_redis:
  grok_cdncache:
